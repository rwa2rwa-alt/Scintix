<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيادة الابتسامة | Smile Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --primary: #00a8a8;
    --primary-dark: #007a7a;
    --primary-light: #e0f7f7;
    --white: #ffffff;
    --dark: #0d2233;
    --gray: #f4f8fb;
    --text: #2d4a5a;
    --text-light: #7a9aaa;
    --shadow: 0 8px 40px rgba(0,168,168,0.13);
    --shadow2: 0 2px 20px rgba(0,0,0,0.08);
    --radius: 18px;
    --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Cairo', 'Poppins', sans-serif;
    color: var(--text);
    background: var(--white);
    overflow-x: hidden;
    direction: rtl;
  }
  /* ========== SCROLLBAR ========== */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: var(--primary-light); }
  ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
  /* ========== NAVBAR ========== */
  nav {
    position: fixed; top: 0; right: 0; left: 0; z-index: 1000;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(18px);
    box-shadow: 0 2px 30px rgba(0,168,168,0.1);
    transition: var(--transition);
    padding: 0 40px;
  }
  nav.scrolled { box-shadow: 0 4px 40px rgba(0,168,168,0.18); }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1280px; margin: 0 auto; height: 72px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }
  .logo-icon {
    width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(0,168,168,0.35);
  }
  .logo-icon i { color: #fff; font-size: 22px; }
  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-text span:first-child {
    font-size: 20px; font-weight: 900; color: var(--primary);
    letter-spacing: -0.5px;
  }
  .logo-text span:last-child {
    font-size: 11px; font-weight: 400; color: var(--text-light);
    font-family: 'Poppins', sans-serif; letter-spacing: 1px;
  }
  .nav-links {
    display: flex; align-items: center; gap: 4px; list-style: none;
  }
  .nav-links a {
    text-decoration: none; padding: 8px 16px; border-radius: 10px;
    color: var(--text); font-size: 14px; font-weight: 600;
    transition: var(--transition); position: relative;
  }
  .nav-links a:hover, .nav-links a.active {
    color: var(--primary); background: var(--primary-light);
  }
  .nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
    color: #fff !important; border-radius: 12px !important;
    padding: 10px 22px !important;
    box-shadow: 0 4px 18px rgba(0,168,168,0.35);
  }
  .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,168,168,0.45) !important; }
  .hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    padding: 8px; border-radius: 10px; transition: var(--transition);
  }
  .hamburger span {
    width: 24px; height: 2.5px; background: var(--primary);
    border-radius: 2px; transition: var(--transition); display: block;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }
  .mobile-menu {
    display: none; position: fixed; top: 72px; right: 0; left: 0;
    background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
    padding: 20px; z-index: 999; border-bottom: 2px solid var(--primary-light);
    flex-direction: column; gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    text-decoration: none; padding: 13px 18px; border-radius: 12px;
    color: var(--text); font-size: 15px; font-weight: 600;
    transition: var(--transition); display: block;
  }
  .mobile-menu a:hover { color: var(--primary); background: var(--primary-light); }
  /* ========== HERO ========== */
  .hero {
    min-height: 100vh; position: relative; overflow: hidden;
    display: flex; align-items: center;
    background: linear-gradient(135deg, #e8fafa 0%, #f0fffe 40%, #e0f7f7 100%);
  }
  .hero-bg-shapes {
    position: absolute; inset: 0; pointer-events: none;
    overflow: hidden;
  }
  .shape {
    position: absolute; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,168,168,0.12), rgba(0,168,168,0.04));
    animation: floatShape 8s ease-in-out infinite;
  }
  .shape-1 { width: 600px; height: 600px; top: -200px; left: -200px; animation-delay: 0s; }
  .shape-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; animation-delay: 3s; }
  .shape-3 { width: 200px; height: 200px; top: 40%; left: 50%; animation-delay: 1.5s; }
  @keyframes floatShape {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(10deg); }
  }
  .particles {
    position: absolute; inset: 0; pointer-events: none;
  }
  .particle {
    position: absolute; width: 6px; height: 6px;
    background: var(--primary); border-radius: 50%; opacity: 0.2;
    animation: particleFloat 6s ease-in-out infinite;
  }
  @keyframes particleFloat {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
    50% { transform: translateY(-40px) scale(1.5); opacity: 0.5; }
  }
  .hero-container {
    max-width: 1280px; margin: 0 auto; padding: 100px 40px 60px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    position: relative; z-index: 2; width: 100%;
  }
  .hero-content { animation: slideInRight 1s ease; }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,168,168,0.1); border: 1.5px solid rgba(0,168,168,0.25);
    border-radius: 50px; padding: 8px 18px; margin-bottom: 24px;
    font-size: 13px; font-weight: 600; color: var(--primary);
  }
  .hero-badge i { font-size: 14px; }
  .hero-title {
    font-size: clamp(36px, 5vw, 62px); font-weight: 900; line-height: 1.15;
    color: var(--dark); margin-bottom: 20px;
  }
  .hero-title span { color: var(--primary); position: relative; }
  .hero-title span::after {
    content: ''; position: absolute; bottom: 4px; right: 0; left: 0;
    height: 8px; background: rgba(0,168,168,0.2); z-index: -1;
    border-radius: 4px;
  }
  .hero-desc {
    font-size: 17px; color: var(--text-light); line-height: 1.9;
    margin-bottom: 36px; font-weight: 400;
  }
  .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; padding: 15px 32px; border-radius: 14px;
    text-decoration: none; font-size: 15px; font-weight: 700;
    box-shadow: 0 8px 28px rgba(0,168,168,0.38);
    transition: var(--transition);
  }
  .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,168,168,0.5); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--white); color: var(--primary);
    padding: 15px 32px; border-radius: 14px;
    text-decoration: none; font-size: 15px; font-weight: 700;
    border: 2px solid var(--primary);
    box-shadow: var(--shadow2); transition: var(--transition);
  }
  .btn-secondary:hover { background: var(--primary-light); transform: translateY(-4px); }
  .hero-stats {
    display: flex; gap: 30px; margin-top: 40px; flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 32px; font-weight: 900; color: var(--primary);
    display: block; line-height: 1;
  }
  .stat-label { font-size: 13px; color: var(--text-light); font-weight: 600; }
  .hero-visual { animation: slideInLeft 1s ease 0.2s both; position: relative; }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .hero-image-wrapper {
    position: relative; display: flex; justify-content: center;
  }
  .hero-main-card {
    background: var(--white); border-radius: 28px;
    box-shadow: 0 20px 70px rgba(0,168,168,0.2);
    overflow: hidden; position: relative;
    width: 100%; max-width: 420px;
    animation: heroFloat 5s ease-in-out infinite;
  }
  @keyframes heroFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .hero-card-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    padding: 40px 30px; text-align: center;
  }
  .hero-card-icon {
    width: 100px; height: 100px; background: rgba(255,255,255,0.2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; border: 3px solid rgba(255,255,255,0.4);
  }
  .hero-card-icon i { font-size: 48px; color: #fff; }
  .hero-card-title { color: #fff; font-size: 22px; font-weight: 800; }
  .hero-card-sub { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 4px; }
  .hero-card-body { padding: 28px 30px; }
  .feature-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--gray);
  }
  .feature-item:last-child { border-bottom: none; }
  .feature-icon-wrap {
    width: 40px; height: 40px; background: var(--primary-light);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .feature-icon-wrap i { color: var(--primary); font-size: 16px; }
  .feature-text strong { font-size: 14px; color: var(--dark); display: block; }
  .feature-text span { font-size: 12px; color: var(--text-light); }
  .float-badge {
    position: absolute; background: var(--white);
    border-radius: 16px; padding: 14px 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    display: flex; align-items: center; gap: 10px;
    animation: floatBadge 3s ease-in-out infinite;
  }
  .float-badge-1 { top: 20px; right: -20px; animation-delay: 0s; }
  .float-badge-2 { bottom: 40px; left: -20px; animation-delay: 1.5s; }
  @keyframes floatBadge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .float-badge i { color: var(--primary); font-size: 20px; }
  .float-badge-text strong { font-size: 15px; font-weight: 800; color: var(--dark); display: block; }
  .float-badge-text span { font-size: 11px; color: var(--text-light); }
  /* ========== SECTIONS ========== */
  section { padding: 90px 40px; }
  .container { max-width: 1280px; margin: 0 auto; }
  .section-header { text-align: center; margin-bottom: 60px; }
  .section-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary-light); color: var(--primary);
    padding: 8px 20px; border-radius: 50px; font-size: 13px;
    font-weight: 700; margin-bottom: 16px; letter-spacing: 0.5px;
  }
  .section-title {
    font-size: clamp(28px, 4vw, 44px); font-weight: 900;
    color: var(--dark); margin-bottom: 16px; line-height: 1.2;
  }
  .section-title span { color: var(--primary); }
  .section-desc {
    font-size: 16px; color: var(--text-light);
    max-width: 600px; margin: 0 auto; line-height: 1.8;
  }
  .divider {
    width: 60px; height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    border-radius: 2px; margin: 16px auto 0;
  }
  /* ========== ABOUT ========== */
  #about { background: var(--white); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 70px; align-items: center;
  }
  .about-image-block { position: relative; }
  .about-main-img {
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    border-radius: 28px; aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .about-main-img-inner {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #e0f7f7 0%, #a0e6e6 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .about-main-img-inner i { font-size: 80px; color: var(--primary); opacity: 0.6; }
  .about-main-img-inner span { font-size: 18px; font-weight: 700; color: var(--primary-dark); }
  .about-accent-card {
    position: absolute; bottom: -24px; left: -24px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 20px; padding: 24px;
    box-shadow: 0 12px 40px rgba(0,168,168,0.35);
    color: #fff; min-width: 180px;
  }
  .about-accent-card .big-num {
    font-size: 48px; font-weight: 900; line-height: 1;
  }
  .about-accent-card .big-num span { font-size: 28px; }
  .about-accent-card p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .about-content {}
  .about-content h2 {
    font-size: clamp(26px, 3vw, 40px); font-weight: 900;
    color: var(--dark); margin-bottom: 20px; line-height: 1.25;
  }
  .about-content h2 span { color: var(--primary); }
  .about-content p {
    font-size: 16px; color: var(--text-light);
    line-height: 1.9; margin-bottom: 16px;
  }
  .about-features { display: flex; flex-direction: column; gap: 16px; margin-top: 28px; }
  .about-feature {
    display: flex; align-items: center; gap: 14px;
    background: var(--gray); border-radius: 14px; padding: 16px 20px;
    transition: var(--transition);
  }
  .about-feature:hover { background: var(--primary-light); transform: translateX(-4px); }
  .about-feature i { color: var(--primary); font-size: 20px; flex-shrink: 0; }
  .about-feature span { font-size: 15px; font-weight: 600; color: var(--dark); }
  /* ========== SERVICES ========== */
  #services { background: var(--gray); }
  .services-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
  }
  .service-card {
    background: var(--white); border-radius: var(--radius);
    padding: 36px 28px; text-align: center;
    box-shadow: var(--shadow2); transition: var(--transition);
    position: relative; overflow: hidden; cursor: pointer;
    border: 2px solid transparent;
  }
  .service-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--primary-light), transparent);
    opacity: 0; transition: var(--transition);
  }
  .service-card:hover {
    transform: translateY(-10px); box-shadow: var(--shadow);
    border-color: var(--primary);
  }
  .service-card:hover::before { opacity: 1; }
  .service-icon {
    width: 80px; height: 80px; margin: 0 auto 22px;
    background: linear-gradient(135deg, var(--primary-light), rgba(0,168,168,0.15));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition); position: relative; z-index: 1;
  }
  .service-card:hover .service-icon {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    transform: scale(1.1) rotate(-5deg);
  }
  .service-icon i { font-size: 34px; color: var(--primary); transition: var(--transition); }
  .service-card:hover .service-icon i { color: #fff; }
  .service-title {
    font-size: 18px; font-weight: 800; color: var(--dark);
    margin-bottom: 12px; position: relative; z-index: 1;
  }
  .service-desc {
    font-size: 14px; color: var(--text-light);
    line-height: 1.8; position: relative; z-index: 1;
  }
  .service-num {
    position: absolute; top: 20px; left: 22px;
    font-size: 52px; font-weight: 900;
    color: var(--primary); opacity: 0.06; line-height: 1;
    font-family: 'Poppins', sans-serif;
  }
  /* ========== PORTFOLIO ========== */
  #portfolio { background: var(--white); }
  .portfolio-filter {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 40px;
  }
  .filter-btn {
    padding: 9px 22px; border-radius: 50px; border: 2px solid var(--primary);
    background: transparent; color: var(--primary); font-size: 13px;
    font-weight: 700; cursor: pointer; transition: var(--transition);
    font-family: 'Cairo', sans-serif;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--primary); color: #fff;
    box-shadow: 0 4px 18px rgba(0,168,168,0.3);
  }
  .portfolio-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 28px;
  }
  .portfolio-card {
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow2); transition: var(--transition);
    position: relative; cursor: pointer;
  }
  .portfolio-card:hover { transform: translateY(-8px); box-shadow: var(--shadow); }
  .portfolio-img {
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .portfolio-img-inner {
    width: 100%; height: 100%; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
  }
  .portfolio-img-inner i { font-size: 50px; color: var(--primary); opacity: 0.5; }
  .portfolio-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,168,168,0.9), rgba(0,90,90,0.9));
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    opacity: 0; transition: var(--transition);
  }
  .portfolio-card:hover .portfolio-overlay { opacity: 1; }
  .portfolio-overlay i { font-size: 40px; color: #fff; }
  .portfolio-overlay span { color: #fff; font-size: 14px; font-weight: 600; }
  .portfolio-info { background: var(--white); padding: 22px 24px; }
  .portfolio-tag {
    font-size: 11px; color: var(--primary); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .portfolio-info h3 { font-size: 17px; font-weight: 800; color: var(--dark); margin-bottom: 6px; }
  .portfolio-info p { font-size: 13px; color: var(--text-light); line-height: 1.7; }
  /* ========== TEAM ========== */
  #team { background: var(--gray); }
  .team-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 28px;
  }
  .team-card {
    background: var(--white); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow2);
    transition: var(--transition); text-align: center;
  }
  .team-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
  .team-avatar {
    height: 200px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .team-avatar-initials {
    width: 90px; height: 90px; background: rgba(255,255,255,0.25);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: 3px solid rgba(255,255,255,0.5);
    font-size: 32px; font-weight: 900; color: #fff;
  }
  .team-pattern {
    position: absolute; inset: 0; opacity: 0.1;
    background-image: radial-gradient(circle, #fff 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .team-info { padding: 24px; }
  .team-name { font-size: 19px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
  .team-title { font-size: 13px; color: var(--primary); font-weight: 600; margin-bottom: 12px; }
  .team-desc { font-size: 13px; color: var(--text-light); line-height: 1.7; }
  .team-social {
    display: flex; gap: 10px; justify-content: center; margin-top: 16px;
  }
  .team-social a {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--primary-light); display: flex; align-items: center;
    justify-content: center; color: var(--primary); text-decoration: none;
    transition: var(--transition); font-size: 14px;
  }
  .team-social a:hover { background: var(--primary); color: #fff; transform: translateY(-3px); }
  /* ========== TESTIMONIALS ========== */
  #testimonials {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    position: relative; overflow: hidden;
  }
  #testimonials::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  #testimonials .section-title { color: #fff; }
  #testimonials .section-badge {
    background: rgba(255,255,255,0.2); color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
  }
  #testimonials .section-desc { color: rgba(255,255,255,0.8); }
  #testimonials .divider { background: rgba(255,255,255,0.4); }
  .testimonials-slider { position: relative; overflow: hidden; }
  .testimonials-track {
    display: flex; gap: 28px; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .testimonial-card {
