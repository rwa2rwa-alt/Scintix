  :root {

    --font-ar: 'Tajawal', sans-serif;
    --font-en: 'Cormorant Garamond', serif;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow-sm: 0 2px 12px rgba(183,110,121,0.10);
    --shadow-md: 0 8px 32px rgba(183,110,121,0.18);
    --shadow-lg: 0 20px 60px rgba(183,110,121,0.22);
    --radius: 16px;
    --radius-sm: 8px;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: var(--font-ar);

    overflow-x: hidden;

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }

  ::-webkit-scrollbar-thumb { background: var(--rose); border-radius: 3px; }

  /* ===== NAVBAR ===== */
  .navbar {
    position: fixed;
    top: 0; right: 0; left: 0;
    z-index: 1000;
    background: rgba(28,28,28,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(183,110,121,0.2);
    transition: var(--transition);
  }

  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;

  .logo-icon {
    width: 44px; height: 44px;

    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(183,110,121,0.4);
    flex-shrink: 0;
    transition: transform var(--transition);
  }

  .nav-logo:hover .logo-icon { transform: rotate(10deg) scale(1.05); }

  .logo-text { display: flex; flex-direction: column; }
  .logo-ar { font-size: 15px; font-weight: 800; color: var(--white); line-height: 1.2; }
  .logo-en { font-size: 11px; font-weight: 400; color: var(--rose-light); font-family: var(--font-en); letter-spacing: 1px; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
    list-style: none;
  }

  .nav-links a {
    display: block;
    padding: 8px 14px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 4px; right: 14px; left: 14px;
    height: 1.5px;
    background: var(--rose);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform var(--transition);
  }

  .nav-links a:hover { color: var(--rose-light); }
  .nav-links a:hover::after { transform: scaleX(1); }

  .nav-cta {
    background: linear-gradient(135deg, var(--rose), var(--rose-dark)) !important;
    color: var(--white) !important;
    padding: 9px 20px !important;
    border-radius: 24px !important;
    font-weight: 700 !important;
    box-shadow: 0 4px 16px rgba(183,110,121,0.35);
    transition: var(--transition) !important;
  }

  .nav-cta::after { display: none !important; }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(183,110,121,0.45) !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border: none;
    background: none;
  }

  .hamburger span {
    display: block;

    transition: var(--transition);

  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-8px); }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px; right: 0; left: 0;
    background: rgba(28,28,28,0.98);

    padding: 16px 24px 24px;
    z-index: 999;
    border-bottom: 1px solid rgba(183,110,121,0.2);

  .mobile-menu.open { display: block; transform: translateY(0); opacity: 1; }

  .mobile-menu a {

    font-weight: 500;

  }

  .mobile-menu a:hover { color: var(--rose-light); }
  .mobile-menu a:last-child { border-bottom: none; margin-top: 8px; }

  /* ===== SECTION BASE ===== */
  section { padding: 100px 24px; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 64px;

  .section-tag {
    display: inline-block;

  .section-title {

  .section-title span { color: var(--rose); }

  .section-subtitle {
    font-size: 16px;

    line-height: 1.8;
    font-weight: 400;
  }

  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--rose-light));
    border-radius: 2px;
    margin: 16px auto 0;
  }

  /* ===== HERO ===== */
  #home {
    min-height: 100vh;
    background: var(--black);
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 24px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 80% 40%, rgba(183,110,121,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(183,110,121,0.10) 0%, transparent 50%),
      linear-gradient(160deg, #1C1C1C 0%, #2a1a1e 50%, #1C1C1C 100%);
  }

  .hero-pattern {
    position: absolute;
    inset: 0;

      );
  }

  .hero-orb-1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(183,110,121,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }

  .hero-orb-2 {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(183,110,121,0.10) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    animation: float2 10s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }

  .hero-inner {

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
    padding: 120px 0 80px;
  }

  .hero-content { animation: fadeInRight 0.9s ease both; }

  @keyframes fadeInRight {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeInLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: rgba(183,110,121,0.12);
    border: 1px solid rgba(183,110,121,0.3);

    font-weight: 600;
    margin-bottom: 28px;

  }

  .hero-badge::before { content: '✦'; font-size: 10px; }

  .hero-title {
    font-size: clamp(34px, 5vw, 58px);

    color: var(--white);
    line-height: 1.25;
    margin-bottom: 12px;
  }

  .hero-title-ar { display: block; }
  .hero-title-gold { color: var(--rose); display: block; }
  .hero-title-sub {

  .btn-primary:hover {

  .btn-secondary {

  .hero-stats {

  .stat-item { text-align: center; }

  .hero-visual {
    display: flex;
    justify-content: center;

    animation: fadeInLeft 0.9s ease 0.2s both;
  }

  .hero-card-wrap {
    position: relative;
    width: 380px;
    height: 480px;
  }

  .hero-card-main {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(183,110,121,0.15), rgba(183,110,121,0.05));

  .hero-card-main::before {
    content: '';

    top: -1px; right: -1px; bottom: -1px; left: -1px;
    background: linear-gradient(135deg, rgba(183,110,121,0.3), transparent 50%, rgba(183,110,121,0.1));
    border-radius: 28px;

  .hero-icon-main {

  @keyframes pulse {

  .hero-float-badge {

  .float-icon { font-size: 22px; }

    color: var(--black);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .service-features li::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--rose);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== PORTFOLIO ===== */
  #portfolio {
    background: var(--black);
    position: relative;
    overflow: hidden;
  }

  #portfolio .section-title { color: var(--white); }
  #portfolio .section-subtitle { color: rgba(255,255,255,0.55); }
  #portfolio .section-tag { background: rgba(183,110,121,0.15); border-color: rgba(183,110,121,0.3); }

  .portfolio-filter {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .filter-btn {
    padding: 8px 22px;
    border-radius: 24px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font-ar);
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: var(--rose);
    border-color: var(--rose);
    color: var(--white);
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .portfolio-item {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 4/5;
    background: var(--black-soft);
    border: 1px solid rgba(183,110,121,0.1);
    cursor: pointer;
    transition: var(--transition);
  }

  .portfolio-item:nth-child(2) { aspect-ratio: 4/6; }
  .portfolio-item:nth-child(4) { aspect-ratio: 4/6; grid-row: span 1; }

  .portfolio-item:hover { transform: scale(1.02); box-shadow: var(--shadow-lg); }

  .portfolio-item-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px;
  }

  .portfolio-emoji { font-size: 60px; opacity: 0.6; transition: var(--transition); }
  .portfolio-item:hover .portfolio-emoji { opacity: 1; transform: scale(1.1); }

  .portfolio-item-glow {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      145deg,
      rgba(183,110,121,0.08) 0%,
      transparent 50%,
      rgba(183,110,121,0.05) 100%
    );
  }

  .portfolio-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(28,28,28,0.95) 0%, transparent 50%);
    opacity: 0;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
  }

  .portfolio-item:hover .portfolio-overlay { opacity: 1; }

  .portfolio-cat {
    font-size: 11px;
    color: var(--rose-light);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .portfolio-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
  }

  /* ===== TESTIMONIALS ===== */
  #testimonials {
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  #testimonials::before {
    content: '❝';
    position: absolute;
    top: 60px; right: 60px;
    font-size: 200px;
    color: var(--rose);
    opacity: 0.04;
    line-height: 1;
    font-family: var(--font-en);
    pointer-events: none;
  }

  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 48px;
  }

  .testimonial-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 36px 28px;
    border: 1px solid rgba(183,110,121,0.1);
    position: relative;
    transition: var(--transition);
  }

  .testimonial-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: rgba(183,110,121,0.25);
  }

  .testimonial-card.featured {
    background: var(--black);
    border-color: rgba(183,110,121,0.3);
  }

  .testimonial-card.featured .testimonial-text { color: rgba(255,255,255,0.8); }
  .testimonial-card.featured .testimonial-name { color: var(--white); }
  .testimonial-card.featured .testimonial-service { color: var(--rose-light); }

  .quote-mark {
    font-size: 40px;
    color: var(--rose);
    line-height: 1;
    margin-bottom: 12px;
    font-family: var(--font-en);
    opacity: 0.6;
  }

  .stars {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .star { color: var(--gold); font-size: 15px; }

  .testimonial-text {
    font-size: 14.5px;
    color: var(--gray);
    line-height: 1.85;
    margin-bottom: 24px;
    font-weight: 400;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .testimonial-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(183,110,121,0.3);
  }

  .testimonial-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--black);
  }

  .testimonial-service {
    font-size: 12px;
    color: var(--rose);
    font-weight: 500;
    margin-top: 2px;
  }

  .testimonials-bottom {
    text-align: center;
  }

  .rating-big {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    padding: 24px 48px;
    background: var(--rose-pale);
    border-radius: 24px;
    border: 1px solid rgba(183,110,121,0.15);
  }

  .rating-num {
    font-size: 52px;
    font-weight: 900;
    color: var(--black);
    line-height: 1;
  }

  .rating-details {}
  .rating-stars { display: flex; gap: 4px; margin-bottom: 4px; }
  .rating-label { font-size: 13px; color: var(--gray); }

  /* ===== FAQ ===== */
  #faq {
    background: var(--cream);
  }

  .faq-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .faq-item {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid rgba(183,110,121,0.1);
    overflow: hidden;
    transition: var(--transition);
  }

  .faq-item:hover { border-color: rgba(183,110,121,0.25); box-shadow: var(--shadow-sm); }
  .faq-item.open { border-color: rgba(183,110,121,0.3); }

  .faq-question {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 24px;
    cursor: pointer;
    gap: 12px;
    transition: var(--transition);
  }

  .faq-question:hover { background: var(--rose-pale); }
  .faq-item.open .faq-question { background: var(--rose-pale); }

  .faq-q-text {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.5;
    flex: 1;
  }

  .faq-chevron {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(183,110,121,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
    color: var(--rose);
    font-size: 18px;
    line-height: 1;
  }

  .faq-item.open .faq-chevron { transform: rotate(180deg); background: var(--rose); color: var(--white); }

  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
  }

  .faq-item.open .faq-answer { max-height: 300px; }

  .faq-answer-inner {
    padding: 0 24px 22px;
    font-size: 14px;
    color: var(--gray);
    line-height: 1.85;
    border-top: 1px solid rgba(183,110,121,0.08);
    padding-top: 16px;
  }

  /* ===== CONTACT ===== */
  #contact {
    background: var(--black);
    position: relative;
    overflow: hidden;
  }

  #contact::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(183,110,121,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 50%, rgba(183,110,121,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  #contact .section-title { color: var(--white); }
  #contact .section-subtitle { color: rgba(255,255,255,0.55); }
  #contact .section-tag { background: rgba(183,110,121,0.15); border-color: rgba(183,110,121,0.3); }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 64px;
    position: relative;
    z-index: 1;
  }

  .contact-info { display: flex; flex-direction: column; gap: 32px; }

  .contact-block {
    padding: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(183,110,121,0.15);
    border-radius: 20px;
    transition: var(--transition);
  }

  .contact-block:hover {
    background: rgba(183,110,121,0.08);
    border-color: rgba(183,110,121,0.3);
    transform: translateY(-2px);
  }

  .contact-block-icon {
    font-size: 28px;
    margin-bottom: 12px;
    display: block;
  }

  .contact-block-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--rose-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .contact-block-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    text-decoration: none;
    transition: color var(--transition);
    direction: ltr;
    display: block;
  }

  .contact-block-value:hover { color: var(--rose-light); }

  .contact-block-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  .socials-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .social-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(183,110,121,0.15);
    border-radius: 12px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: var(--transition);
  }

  .social-link:hover {
    background: var(--rose);
    border-color: var(--rose);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(183,110,121,0.3);
  }

  .social-link-icon { font-size: 16px; }

  /* FORM */
  .contact-form-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(183,110,121,0.15);
    border-radius: 28px;
    padding: 44px;
  }

  .form-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full { grid-column: span 2; }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.3px;
  }

  .form-input,
  .form-select,
  .form-textarea {
    padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(183,110,121,0.15);
    border-radius: 12px;
    color: var(--white);
    font-size: 14px;
    font-family: var(--font-ar);
    transition: var(--transition);
    outline: none;
    width: 100%;
    direction: rtl;
  }

  .form-input::placeholder,
  .form-textarea::placeholder { color: rgba(255,255,255,0.25); }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    border-color: var(--rose);
    background: rgba(183,110,121,0.08);
    box-shadow: 0 0 0 3px rgba(183,110,121,0.12);
  }

  .form-select option { background: var(--black); color: var(--white); }

  .form-textarea {
    resize: vertical;
    min-height: 120px;
  }

  .form-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: var(--font-ar);
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    box-shadow: 0 8px 28px rgba(183,110,121,0.3);
  }

  .form-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(183,110,121,0.45);
  }

  /* ===== WHATSAPP FLOAT ===== */
  .whatsapp-float {
    position: fixed;
    bottom: 32px;
    left: 32px;
    z-index: 900;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .wa-btn {
    width: 58px; height: 58px;
    background: #25d366;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 8px 28px rgba(37,211,102,0.4);
    transition: var(--transition);
    animation: waPulse 2.5s ease-in-out infinite;
  }

  @keyframes waPulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(37,211,102,0.4); }
    50% { box-shadow: 0 8px 40px rgba(37,211,102,0.65); }
  }

  .wa-btn:hover { transform: scale(1.1); }

  .wa-tooltip {
    background: var(--black);
    color: var(--white);
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transform: translateX(-10px);
    transition: var(--transition);
    pointer-events: none;
    border: 1px solid rgba(183,110,121,0.2);
  }

  .whatsapp-float:hover .wa-tooltip {
    opacity: 1;
    transform: translateX(0);
  }

  /* ===== FOOTER ===== */
  footer {
    background: var(--black-soft);
    border-top: 1px solid rgba(183,110,121,0.12);
    padding: 60px 24px 32px;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .footer-top {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 48px;
  }

  .footer-brand {}

  .footer-logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .footer-logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .footer-logo-name { font-size: 16px; font-weight: 800; color: var(--white); }
  .footer-logo-sub { font-size: 11px; color: var(--rose-light); font-family: var(--font-en); }

  .footer-brand-desc {
    font-size: 13.5px;
    color: rgba(255,255,255,0.45);
    line-height: 1.8;
    margin-bottom: 24px;
  }

  .footer-socials {
    display: flex;
    gap: 10px;
  }

  .footer-social-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(183,110,121,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    text-decoration: none;
    transition: var(--transition);
    color: rgba(255,255,255,0.5);
  }

  .footer-social-btn:hover {
    background: var(--rose);
    border-color: var(--rose);
    transform: translateY(-2px);
  }

  .footer-col-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--rose-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .footer-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .footer-links a {
    font-size: 13.5px;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    transition: color var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .footer-links a::before { content: '›'; color: var(--rose); font-size: 16px; }
  .footer-links a:hover { color: rgba(255,255,255,0.85); }

  .footer-contact-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }

  .footer-contact-icon { font-size: 15px; margin-top: 1px; flex-shrink: 0; }

  .footer-contact-text {
