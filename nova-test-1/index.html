<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة البناء الحديث | Modern Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
<style>
  :root {
    --primary: #1a3c5e;
    --gold: #d4af37;
    --gold-light: #f0d060;
    --gold-dark: #b8960a;
    --white: #ffffff;
    --light: #f8f5f0;
    --gray: #6c757d;
    --dark: #111820;
    --text: #2d3748;
    --border: rgba(212,175,55,0.3);
    --shadow: 0 20px 60px rgba(26,60,94,0.15);
    --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    background: var(--white);
    overflow-x: hidden;
    direction: rtl;
  }
  .en { font-family: 'Playfair Display', serif; }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
  /* LOADER */
  #loader {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: var(--dark); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }
  .loader-logo {
    font-size: 2rem; font-weight: 900; color: var(--gold);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .loader-bar {
    width: 200px; height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  .loader-bar-inner {
    height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 3px; animation: loading 2s ease forwards;
  }
  @keyframes loading { from{width:0} to{width:100%} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    transition: var(--transition);
    padding: 0 40px;
  }
  nav.scrolled {
    background: rgba(17,24,32,0.97);
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 80px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; cursor: pointer;
  }
  .nav-logo-icon {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; color: var(--dark);
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
  }
  .nav-logo-text { display: flex; flex-direction: column; }
  .nav-logo-text span:first-child {
    font-size: 1rem; font-weight: 900; color: var(--white); line-height: 1.2;
  }
  .nav-logo-text span:last-child {
    font-size: 0.65rem; color: var(--gold); font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
  }
  .nav-links {
    display: flex; align-items: center; gap: 8px; list-style: none;
  }
  .nav-links li a {
    text-decoration: none; color: rgba(255,255,255,0.85);
    font-size: 0.9rem; font-weight: 600; padding: 8px 16px;
    border-radius: 6px; transition: var(--transition);
    position: relative;
  }
  .nav-links li a::after {
    content: ''; position: absolute; bottom: 0; left: 50%; right: 50%;
    height: 2px; background: var(--gold);
    transition: var(--transition); border-radius: 1px;
  }
  .nav-links li a:hover { color: var(--gold); }
  .nav-links li a:hover::after, .nav-links li a.active::after { left: 16px; right: 16px; }
  .nav-links li a.active { color: var(--gold); }
  .nav-cta {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark) !important; font-weight: 700 !important;
    padding: 10px 24px !important; border-radius: 8px !important;
    box-shadow: 0 4px 15px rgba(212,175,55,0.3);
  }
  .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.5) !important; }
  .nav-cta::after { display: none !important; }
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 8px; border: none; background: none;
  }
  .hamburger span {
    width: 28px; height: 2px; background: var(--white);
    border-radius: 2px; transition: var(--transition);
  }
  .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-menu {
    position: fixed; top: 80px; left: 0; right: 0; bottom: 0;
    background: rgba(17,24,32,0.98); backdrop-filter: blur(20px);
    z-index: 999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    transform: translateX(100%); transition: var(--transition);
  }
  .mobile-menu.open { transform: translateX(0); }
  .mobile-menu a {
    text-decoration: none; color: var(--white); font-size: 1.4rem;
    font-weight: 700; padding: 12px 40px; transition: var(--transition);
    border-bottom: 1px solid var(--border); width: 100%; text-align: center;
  }
  .mobile-menu a:hover { color: var(--gold); }
  /* SECTIONS */
  section { display: none; min-height: 100vh; }
  section.active { display: block; }
  /* HERO */
  #home {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #0a1a2e 0%, #1a3c5e 50%, #0d2640 100%);
  }
  .hero-particles {
    position: absolute; top:0; left:0; width:100%; height:100%;
    overflow: hidden; pointer-events: none;
  }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(212,175,55,0.15);
    animation: float-particle linear infinite;
  }
  @keyframes float-particle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }
  .hero-grid {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background-image:
      linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: grid-move 20s linear infinite;
  }
  @keyframes grid-move { to { background-position: 60px 60px; } }
  .hero-content {
    position: relative; z-index: 2;
    max-width: 1400px; margin: 0 auto; padding: 0 40px;
    min-height: 100vh;
    display: flex; align-items: center;
  }
  .hero-text { max-width: 700px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(212,175,55,0.15); border: 1px solid var(--border);
    color: var(--gold); font-size: 0.85rem; font-weight: 600;
    padding: 8px 20px; border-radius: 50px; margin-bottom: 30px;
    backdrop-filter: blur(10px);
    animation: fadeInDown 0.8s ease 0.3s both;
  }
  .hero-badge i { font-size: 0.7rem; animation: pulse 2s infinite; }
  .hero-title {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900; line-height: 1.2;
    color: var(--white); margin-bottom: 10px;
    animation: fadeInDown 0.8s ease 0.5s both;
  }
  .hero-title span {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; display: block;
  }
  .hero-subtitle {
    font-size: 1.1rem; color: rgba(255,255,255,0.7);
    line-height: 1.8; margin-bottom: 40px; max-width: 550px;
    animation: fadeInDown 0.8s ease 0.7s both;
  }
  .hero-btns {
    display: flex; gap: 16px; flex-wrap: wrap;
    animation: fadeInDown 0.8s ease 0.9s both;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); font-weight: 700; font-size: 1rem;
    padding: 16px 36px; border-radius: 10px; border: none;
    cursor: pointer; transition: var(--transition); text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 30px rgba(212,175,55,0.4);
    font-family: 'Cairo', sans-serif;
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(212,175,55,0.6);
  }
  .btn-secondary {
    background: transparent; color: var(--white);
    font-weight: 600; font-size: 1rem;
    padding: 16px 36px; border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer; transition: var(--transition); text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    backdrop-filter: blur(10px); font-family: 'Cairo', sans-serif;
  }
  .btn-secondary:hover {
    border-color: var(--gold); color: var(--gold);
    transform: translateY(-3px);
  }
  .hero-stats {
    position: absolute; bottom: 60px; left: 0; right: 0;
    max-width: 1400px; margin: 0 auto; padding: 0 40px;
    display: flex; gap: 40px;
    animation: fadeInUp 0.8s ease 1.1s both;
  }
  .stat-item {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border); padding-right: 40px;
  }
  .stat-item:first-child { border-right: none; padding-right: 0; }
  .stat-number {
    font-size: 2.5rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
  }
  .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .hero-visual {
    position: absolute; left: 0; top: 0; width: 45%; height: 100%;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .hero-building {
    font-size: 18rem; color: rgba(212,175,55,0.06);
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  @keyframes fadeInDown {
    from { opacity:0; transform:translateY(-30px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  /* SECTION COMMON */
  .section-header {
    text-align: center; margin-bottom: 70px;
  }
  .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--gold); font-size: 0.85rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px;
  }
  .section-tag::before, .section-tag::after {
    content: ''; width: 40px; height: 1px; background: var(--gold);
  }
  .section-title {
    font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900;
    color: var(--primary); margin-bottom: 16px; line-height: 1.3;
  }
  .section-title span { color: var(--gold); }
  .section-desc {
    font-size: 1.05rem; color: var(--gray);
    max-width: 600px; margin: 0 auto; line-height: 1.8;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
  .py { padding: 100px 0; }
  /* ABOUT */
  #about { background: var(--white); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .about-img-wrapper { position: relative; }
  .about-img-main {
    width: 100%; height: 500px;
    background: linear-gradient(135deg, var(--primary), #2a5f8f);
    border-radius: 20px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: var(--shadow);
  }
  .about-img-main i { font-size: 10rem; color: rgba(212,175,55,0.2); }
  .about-img-main::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, transparent 60%);
  }
  .about-badge-float {
    position: absolute; bottom: -20px; right: -20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); padding: 24px; border-radius: 16px;
    text-align: center; box-shadow: 0 10px 40px rgba(212,175,55,0.4);
    min-width: 160px;
  }
  .about-badge-float .num {
    font-size: 2.5rem; font-weight: 900; display: block; line-height: 1;
  }
  .about-badge-float .lbl { font-size: 0.8rem; font-weight: 600; margin-top: 4px; }
  .about-cert {
    position: absolute; top: -20px; left: -20px;
    background: var(--white); border: 2px solid var(--border);
    padding: 16px 20px; border-radius: 12px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .about-cert i { color: var(--gold); font-size: 1.5rem; }
  .about-cert-text span { display: block; }
  .about-cert-text span:first-child { font-size: 0.7rem; color: var(--gray); }
  .about-cert-text span:last-child { font-size: 0.85rem; font-weight: 700; color: var(--primary); }
  .about-content {}
  .about-content h3 {
    font-size: 1.3rem; color: var(--gold); font-weight: 700; margin-bottom: 16px;
  }
  .about-content p {
    color: var(--gray); line-height: 1.9; margin-bottom: 20px; font-size: 1rem;
  }
  .about-features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 30px 0;
  }
  .about-feature {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--light);
    border-radius: 10px; border-right: 3px solid var(--gold);
  }
  .about-feature i { color: var(--gold); font-size: 1rem; }
  .about-feature span { font-size: 0.9rem; font-weight: 600; color: var(--primary); }
  /* SERVICES */
  #services { background: var(--light); }
  .services-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .service-card {
    background: var(--white); border-radius: 16px;
    padding: 36px 28px; transition: var(--transition);
    border: 1px solid transparent; position: relative; overflow: hidden;
    cursor: default;
  }
  .service-card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0); transform-origin: right;
    transition: var(--transition);
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover {
    transform: translateY(-8px);
    border-color: var(--border);
    box-shadow: 0 20px 50px rgba(26,60,94,0.15);
  }
  .service-icon {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, rgba(26,60,94,0.1), rgba(26,60,94,0.05));
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; transition: var(--transition);
    border: 1px solid rgba(26,60,94,0.1);
  }
  .service-card:hover .service-icon {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-color: transparent; transform: scale(1.1);
  }
  .service-icon i { font-size: 2rem; color: var(--primary); transition: var(--transition); }
  .service-card:hover .service-icon i { color: var(--dark); }
  .service-card h3 {
    font-size: 1.1rem; font-weight: 700; color: var(--primary);
    margin-bottom: 12px;
  }
  .service-card p { font-size: 0.9rem; color: var(--gray); line-height: 1.7; }
  .service-card .service-more {
    margin-top: 20px; display: flex; align-items: center; gap: 6px;
    color: var(--gold); font-size: 0.85rem; font-weight: 700;
    opacity: 0; transform: translateY(10px); transition: var(--transition);
  }
  .service-card:hover .service-more { opacity: 1; transform: translateY(0); }
  /* PORTFOLIO */
  #portfolio { background: var(--white); }
  .portfolio-filters {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 50px;
  }
  .filter-btn {
    padding: 10px 24px; border-radius: 50px; border: 2px solid var(--border);
    background: transparent; color: var(--primary); font-weight: 600;
    font-size: 0.9rem; cursor: pointer; transition: var(--transition);
    font-family: 'Cairo', sans-serif;
  }
  .filter-btn.active, .filter-btn:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-color: transparent; color: var(--dark);
    transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.3);
  }
  .portfolio-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
  }
  .portfolio-card {
    border-radius: 16px; overflow: hidden; position: relative;
    height: 300px; cursor: pointer; transition: var(--transition);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .portfolio-card:hover { transform: scale(1.02); }
  .portfolio-card-bg {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; transition: var(--transition);
  }
  .portfolio-card:hover .portfolio-card-bg { transform: scale(1.1); }
  .portfolio-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,20,40,0.95) 0%, rgba(10,20,40,0.3) 60%, transparent 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 28px; transition: var(--transition);
  }
  .portfolio-cat {
    color: var(--gold); font-size: 0.75rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .portfolio-title {
    color: var(--white); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px;
  }
  .portfolio-desc {
    color: rgba(255,255,255,0.7); font-size: 0.85rem;
    transform: translateY(20px); opacity: 0; transition: var(--transition);
  }
  .portfolio-card:hover .portfolio-desc { transform: translateY(0); opacity: 1; }
  .portfolio-link {
    position: absolute; top: 20px; left: 20px;
    width: 44px; height: 44px;
    background: rgba(212,175,55,0.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--dark); font-size: 1rem;
    transform: scale(0); transition: var(--transition);
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
  }
  .portfolio-card:hover .portfolio-link { transform: scale(1); }
  /* TEAM */
  #team { background: var(--light); }
  .team-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px;
  }
  .team-card {
    background: var(--white); border-radius: 20px; overflow: hidden;
    transition: var(--transition); text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }
  .team-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 50px rgba(26,60,94,0.2);
  }
  .team-img {
    width: 100%; height: 220px;
    background: linear-gradient(135deg, var(--primary), #2a5f8f);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .team-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, transparent 60%);
  }
  .team-img i { font-size: 5rem; color: rgba(255,255,255,0.3); }
  .team-avatar {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1.8rem; color: var(--dark);
    font-weight: 900; position: absolute; z-index: 1;
  }
  .team-info { padding: 24px 20px; }
  .team-info h3 { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .team-info p { font-size: 0.85rem; color: var(--gold); font-weight: 600; margin-bottom: 16px; }
  .team-social { display: flex; gap: 10px; justify-content: center; }
  .team-social a {
    width: 36px; height: 36px;
    background: var(--light); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary); font-size: 0.85rem;
    transition: var(--transition); text-decoration: none;
  }
  .team-social a:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); transform: translateY(-2px);
  }
  /* TESTIMONIALS */
  #testimonials {
    background: linear-gradient(135deg, var(--primary) 0%, #0a1a2e 100%);
    position: relative; overflow: hidden;
  }
  #testimonials .section-title { color: var(--white); }
  .testi-bg {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(212,175,55,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .testi-slider { position: relative; overflow: hidden; }
  .testi-track {
    display: flex; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .testi-card {
    min-width: 33.333%; padding: 0 15px;
  }
  .testi-inner {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.2);
    border-radius: 20px; padding: 36px;
    backdrop-filter: blur(10px); transition: var(--transition);
  }
  .testi-inner:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(212,175,55,0.5);
    transform: translateY(-5px);
  }
  .testi-quote {
    font-size: 3rem; color: var(--gold); line-height: 1;
    margin-bottom: 16px; font-family: Georgia, serif;
  }
  .testi-text {
    color: rgba(255,255,255,0.85); line-height: 1.8; font-size: 0.95rem;
    margin-bottom: 24px;
  }
  .testi-author { display: flex; align-items: center; gap: 14px; }
  .testi-avatar {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.1rem; color: var(--dark); flex-shrink: 0;
  }
  .testi-author-info h4 { color: var(--white); font-size: 0.95rem; font-weight: 700; }
  .testi-author-info p { color: var(--gold); font-size: 0.8rem; }
  .testi-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 4px; }
  .testi-nav {
    display: flex; gap: 12px; justify-content: center; margin-top: 40px;
  }
  .testi-btn {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.4); background: transparent;
    color: var(--gold); font-size: 1rem; cursor: pointer;
    transition: var(--transition);
  }
  .testi-btn:hover {
    background: var(--gold); color: var(--dark);
    border-color: var(--gold); transform: scale(1.1);
  }
  .testi-dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  .testi-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.3); cursor: pointer; transition: var(--transition);
  }
  .testi-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
  /* BLOG */
  #blog { background: var(--white); }
  .blog-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
  }
  .blog-card {
    border-radius: 16px; overflow: hidden; transition: var(--transition);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .blog-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 50px rgba(26,60,94,0.15);
  }
  .blog-img {
    height: 200px;
    display: flex; align-items: center; justify-content: center;
    font-size: 6rem; position: relative; overflow: hidden;
  }
  .blog-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(26,60,94,0.15), transparent);
  }
  .blog-cat {
    position: absolute; top: 16px; right: 16px; z-index: 1;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 50px;
  }
  .blog-body { padding: 28px; }
  .blog-meta {
    display: flex; gap: 16px; margin-bottom: 12px;
    color: var(--gray); font-size: 0.8rem;
  }
  .blog-meta span { display: flex; align-items: center; gap: 5px; }
  .blog-body h3 {
    font-size: 1.05rem; font-weight: 700; color: var(--primary);
    margin-bottom: 10px; line-height: 1.5;
  }
  .blog-body p { font-size: 0.88rem; color: var(--gray); line-height: 1.7; margin-bottom: 20px; }
  .blog-read {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--gold); font-weight: 700; font-size: 0.88rem;
    text-decoration: none; transition: var(--transition);
  }
  .blog-read:hover { gap: 12px; }
  /* FAQ */
  #faq { background: var(--light); }
  .faq-container { max-width: 800px; margin: 0 auto; }
  .faq-item {
    background: var(--white); border-radius: 14px; margin-bottom: 16px;
    overflow: hidden; border: 1px solid transparent;
    transition: var(--transition); box-shadow: 0 2px 15px rgba(0,0,0,0.04);
  }
  .faq-item.open { border-color: var(--border); box-shadow: 0 8px 30px rgba(212,175,55,0.1); }
  .faq-q {
    padding: 22px 28px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer;
    font-weight: 700; color: var(--primary); font-size: 1rem;
    gap: 16px;
  }
  .faq-q:hover { color: var(--gold); }
  .faq-icon {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: var(--light); display: flex; align-items: center;
    justify-content: center; color: var(--gold);
    transition: var(--transition); font-size: 1rem;
  }
  .faq-item.open .faq-icon {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); transform: rotate(45deg);
  }
  .faq-a {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease, padding 0.4s ease;
    padding: 0 28px;
  }
  .faq-item.open .faq-a { max-height: 300px; padding: 0 28px 22px; }
  .faq-a p { color: var(--gray); line-height: 1.8; font-size: 0.95rem; }
  /* CONTACT */
  #contact { background: var(--white); }
  .contact-grid {
    display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; align-items: start;
  }
  .contact-info h3 {
    font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 16px;
  }
  .contact-info p { color: var(--gray); line-height: 1.8; margin-bottom: 36px; }
  .contact-item {
    display: flex; gap: 16px; align-items: flex-start;
    margin-bottom: 24px;
  }
  .contact-icon {
    width: 54px; height: 54px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 1.2rem;
  }
  .contact-item-text h4 { font-size: 0.85rem; color: var(--gray); font-weight: 600; margin-bottom: 2px; }
  .contact-item-text p { font-size: 1rem; color: var(--primary); font-weight: 700; }
  .contact-item-text a { color: var(--primary); text-decoration: none; }
  .map-container {
    margin-top: 36px; border-radius: 16px; overflow: hidden;
    height: 220px; border: 2px solid var(--border);
    background: linear-gradient(135deg, var(--primary), #2a5f8f);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: rgba(255,255,255,0.7);
  }
  .map-container i { font-size: 3rem; color: var(--gold); }
  .contact-form { background: var(--light); border-radius: 20px; padding: 40px; }
  .form-group { margin-bottom: 22px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group label {
    display: block; font-size: 0.88rem; font-weight: 700;
    color: var(--primary); margin-bottom: 8px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 14px 18px;
    border: 2px solid rgba(0,0,0,0.08); border-radius: 10px;
    font-family: 'Cairo', sans-serif; font-size: 0.95rem; color: var(--text);
    background: var(--white); transition: var(--transition); outline: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--gold); box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
  }
  .form-group textarea { resize: vertical; min-height: 130px; }
  .form-submit {
    width: 100%; padding: 16px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), #2a5f8f);
    color: var(--white); font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; border-radius: 10px;
    transition: var(--transition); display: flex; align-items: center;
    justify-content: center; gap: 10px;
  }
  .form-submit:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(212,175,55,0.4);
  }
  /* FOOTER */
  footer {
    background: var(--dark);
    padding: 80px 0 30px;
    border-top: 1px solid rgba(212,175,55,0.2);
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 50px;
    margin-bottom: 60px;
  }
  .footer-brand p {
    color: rgba(255,255,255,0.5); font-size: 0.9rem;
    line-height: 1.8; margin: 20px 0;
  }
  .footer-social { display: flex; gap: 10px; }
  .footer-social a {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6); text-decoration: none; transition: var(--transition);
  }
  .footer-social a:hover {
    background: var(--gold); color: var(--dark);
    border-color: var(--gold); transform: translateY(-3px);
  }
  .footer-col h4 {
    color: var(--white); font-size: 1rem; font-weight: 700;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 2px solid var(--border); display: inline-block;
  }
  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 10px; }
  .footer-col ul li a {
    color: rgba(255,255,255,0.5); text-decoration: none;
    font-size: 0.9rem; transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
  }
  .footer-col ul li a::before {
    content: ''; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%; flex-shrink: 0;
    opacity: 0; transition: var(--transition);
  }
  .footer-col ul li a:hover { color: var(--gold); padding-right: 8px; }
  .footer-col ul li a:hover::before { opacity: 1; }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 30px; display: flex;
    align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .footer-bottom p { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
  .footer-bottom span { color: var(--gold); }
  /* BACK TO TOP */
  .back-top {
    position: fixed; bottom: 30px; left: 30px; z-index: 999;
    width: 50px; height: 50px; border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem
