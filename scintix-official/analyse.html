<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Caminotich | تحليل المشروع</title>
  <style>
    :root{
      --bg:#020514;--surface:rgba(10,16,35,0.96);
      --text:#eef5ff;--muted:#8ba5ca;
      --accent:#5cf0ff;--strong:#8d4cff;
      --border:rgba(255,255,255,0.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:radial-gradient(circle at 15% 12%,rgba(92,240,255,.18),transparent 18%),
                 radial-gradient(circle at 88% 6%,rgba(140,77,255,.16),transparent 18%),
                 linear-gradient(180deg,#020414 0%,#050914 100%);
      color:var(--text);
      font-family:'Segoe UI',Tahoma,sans-serif;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
    }
    .card{
      width:min(680px,100%);
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:28px;
      padding:36px 32px;
    }
    .back{
      display:inline-flex;align-items:center;gap:6px;
      color:var(--accent);text-decoration:none;font-size:.88rem;
      margin-bottom:24px;
    }
    h1{font-size:1.7rem;margin-bottom:6px}
    h1 span{color:var(--accent)}
    .sub{color:var(--muted);font-size:.94rem;margin-bottom:28px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
    .grid textarea{grid-column:1/-1;resize:vertical;min-height:88px}
    .grid button{grid-column:1/-1}
    input,textarea{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:13px;padding:12px 15px;
      color:var(--text);font-size:.93rem;font-family:inherit;
      outline:none;width:100%;transition:border-color .2s;
    }
    input::placeholder,textarea::placeholder{color:var(--muted)}
    input:focus,textarea:focus{border-color:var(--accent)}
    button{
      padding:14px 28px;border-radius:999px;border:none;cursor:pointer;
      font-weight:700;font-size:1rem;font-family:inherit;
      background:linear-gradient(135deg,var(--accent),var(--strong));
      color:#031228;transition:transform .25s,box-shadow .25s,opacity .2s;
      display:flex;align-items:center;justify-content:center;gap:10px;
    }
    button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(92,240,255,.25)}
    button:disabled{opacity:.5;cursor:not-allowed}
    .spinner{
      width:18px;height:18px;border:2px solid rgba(3,18,40,.3);
      border-top-color:#031228;border-radius:50%;
      animation:spin .7s linear infinite;display:none;
    }
    button.loading .spinner{display:block}
    button.loading .lbl{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{
      margin-top:22px;padding:22px 20px;border-radius:18px;
      background:rgba(92,240,255,0.05);border:1px solid rgba(92,240,255,0.18);
      display:none;line-height:1.95;white-space:pre-wrap;
    }
    .result.on{display:block}
    .result strong{color:var(--accent)}
    .err{
      margin-top:14px;padding:13px 17px;border-radius:13px;
      background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.2);
      color:#ff7070;display:none;font-size:.9rem;
    }
    .err.on{display:block}
    /* ── Netlify / Cloudflare badge ── */
    .note{
      margin-top:20px;padding:12px 16px;border-radius:12px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      color:var(--muted);font-size:.8rem;line-height:1.7;
    }
    .note a{color:var(--accent);text-decoration:none}
  </style>
    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2BM3RDE6XC"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-2BM3RDE6XC");</script>
</head>
<body>
<div class="card">
  <a class="back" href="index.html">← الرئيسية</a>
  <h1>🤖 تحليل مشروعك <span>بالذكاء الاصطناعي</span></h1>
  <p class="sub">أخبرنا عن مشروعك وسنرشّدك فوراً إلى أنسب باقة وخطة عمل</p>

  <div class="grid">
    <input  id="company"  placeholder="اسم الشركة"/>
    <input  id="email"    placeholder="البريد الإلكتروني" type="email"/>
    <textarea id="desc"   placeholder="وصف المشروع بالتفصيل..."></textarea>
    <input  id="budget"   placeholder="الميزانية التقريبية"/>
    <button id="btn" onclick="run()">
      <span class="spinner"></span>
      <span class="lbl">✦ تحليل المشروع</span>
    </button>
  </div>

  <div class="result" id="result"></div>
  <div class="err"    id="err"></div>

  <div class="note" id="setup-note">
    <strong>⚙️ للمطورين:</strong>
    هذا النموذج يحتاج <strong>Netlify Function</strong> (أو Cloudflare Worker) كـ proxy للـ API.
    راجع ملف <code>netlify/functions/analyse.js</code> المرفق.
    <a href="https://docs.netlify.com/functions/get-started/" target="_blank">دليل Netlify Functions ←</a>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   يستدعي: POST /.netlify/functions/analyse
   (الملف netlify/functions/analyse.js)
══════════════════════════════════════════ */
async function run() {
  const btn    = document.getElementById('btn');
  const result = document.getElementById('result');
  const errBox = document.getElementById('err');
  const desc   = document.getElementById('desc').value.trim();
  const company= document.getElementById('company').value.trim();
  const email  = document.getElementById('email').value.trim();
  const budget = document.getElementById('budget').value.trim();

  result.classList.remove('on');
  errBox.classList.remove('on');

  if (!desc) {
    errBox.textContent = '⚠️ يرجى إدخال وصف المشروع على الأقل.';
    errBox.classList.add('on');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch('/.netlify/functions/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company, email, desc, budget })
    });

    if (!res.ok) {
      const body = await res.text();
      throw new Error(body || 'Server error ' + res.status);
    }

    const data = await res.json();
    const text = data.result || '';
    result.innerHTML = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    result.classList.add('on');
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (e) {
    errBox.textContent = '⚠️ ' + (e.message || 'حدث خطأ. حاولي مرة أخرى.');
    errBox.classList.add('on');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}
</script>

</html>
