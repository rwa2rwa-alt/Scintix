<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقهى اللمة | Al-Lamma Café</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
<style>
  :root {
    --brown: #6b4226;
    --brown-dark: #4a2c16;
    --brown-light: #8b5a32;
    --cream: #f4e1c1;
    --cream-dark: #e8cfa0;
    --cream-light: #fdf6ed;
    --white: #ffffff;
    --text-dark: #2c1a0e;
    --text-mid: #5a3a1f;
    --shadow: 0 10px 40px rgba(107,66,38,0.15);
    --shadow-hover: 0 20px 60px rgba(107,66,38,0.25);
    --radius: 16px;
    --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--cream-light);
    color: var(--text-dark);
    overflow-x: hidden;
    direction: rtl;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--brown); border-radius: 4px; }

  /* ===== NAVBAR ===== */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 2rem;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(253,246,237,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(107,66,38,0.1);
    transition: var(--transition);
  }

  nav.scrolled {
    box-shadow: var(--shadow);
    height: 60px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo-icon {
    width: 42px;
    height: 42px;
    background: var(--brown);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: var(--cream);
    box-shadow: 0 4px 15px rgba(107,66,38,0.3);
  }

  .nav-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .nav-logo-text span:first-child {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--brown);
  }

  .nav-logo-text span:last-child {
    font-size: 0.65rem;
    color: var(--brown-light);
    font-family: 'Playfair Display', serif;
    letter-spacing: 1px;
  }

  .nav-links {
    display: flex;
    list-style: none;
    gap: 0.3rem;
    align-items: center;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text-mid);
    font-size: 0.9rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 25px;
    transition: var(--transition);
    position: relative;
  }

  .nav-links a:hover,
  .nav-links a.active {
    background: var(--brown);
    color: var(--cream);
  }

  .lang-btn {
    background: var(--brown);
    color: var(--cream) !important;
    border-radius: 25px !important;
    padding: 6px 16px !important;
    font-weight: 700 !important;
    cursor: pointer;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem;
    transition: var(--transition);
  }

  .lang-btn:hover {
    background: var(--brown-dark) !important;
    transform: scale(1.05);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 5px;
  }

  .hamburger span {
    display: block;
    width: 25px;
    height: 2.5px;
    background: var(--brown);
    border-radius: 2px;
    transition: var(--transition);
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 70px;
    left: 0;
    right: 0;
    background: rgba(253,246,237,0.98);
    backdrop-filter: blur(20px);
    z-index: 999;
    padding: 1.5rem;
    border-bottom: 2px solid var(--brown);
    transform: translateY(-20px);
    opacity: 0;
    transition: var(--transition);
  }

  .mobile-menu.open {
    display: block;
    transform: translateY(0);
    opacity: 1;
  }

  .mobile-menu a {
    display: block;
    text-decoration: none;
    color: var(--text-dark);
    font-size: 1rem;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 5px;
    transition: var(--transition);
  }

  .mobile-menu a:hover {
    background: var(--cream-dark);
    color: var(--brown);
    padding-right: 24px;
  }

  /* ===== HERO ===== */
  #home {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown) 50%, var(--brown-light) 100%);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 80%;
    height: 180%;
    background: radial-gradient(ellipse, rgba(244,225,193,0.15) 0%, transparent 70%);
    animation: bgPulse 6s ease-in-out infinite;
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 60%;
    height: 120%;
    background: radial-gradient(ellipse, rgba(244,225,193,0.08) 0%, transparent 70%);
    animation: bgPulse 8s ease-in-out infinite reverse;
  }

  .hero-shapes {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .hero-shapes .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
  }

  .shape-1 {
    width: 400px;
    height: 400px;
    background: var(--cream);
    top: -100px;
    right: -100px;
    animation: float 8s ease-in-out infinite;
  }

  .shape-2 {
    width: 250px;
    height: 250px;
    background: var(--cream);
    bottom: -50px;
    left: 10%;
    animation: float 10s ease-in-out infinite reverse;
  }

  .shape-3 {
    width: 150px;
    height: 150px;
    background: var(--cream);
    top: 30%;
    left: 5%;
    animation: float 7s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(5deg); }
  }

  @keyframes bgPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(244,225,193,0.15);
    border: 1px solid rgba(244,225,193,0.3);
    color: var(--cream);
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    backdrop-filter: blur(10px);
    animation: fadeDown 1s ease forwards;
  }

  .hero-title {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 0.5rem;
    animation: fadeUp 1s ease 0.2s both;
    text-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }

  .hero-title-en {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: var(--cream-dark);
    font-weight: 400;
    letter-spacing: 3px;
    margin-bottom: 1.5rem;
    animation: fadeUp 1s ease 0.4s both;
    display: block;
  }

  .hero-desc {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: rgba(244,225,193,0.85);
    line-height: 1.8;
    max-width: 550px;
    margin: 0 auto 2.5rem;
    animation: fadeUp 1s ease 0.6s both;
  }

  .hero-btns {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 1s ease 0.8s both;
  }

  .btn-primary {
    background: var(--cream);
    color: var(--brown-dark);
    padding: 14px 36px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    transition: var(--transition);
    box-shadow: 0 8px 30px rgba(244,225,193,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(244,225,193,0.4);
    background: var(--cream-light);
  }

  .btn-outline {
    background: transparent;
    color: var(--cream);
    padding: 14px 36px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    border: 2px solid rgba(244,225,193,0.5);
    transition: var(--transition);
  }

  .btn-outline:hover {
    background: rgba(244,225,193,0.1);
    border-color: var(--cream);
    transform: translateY(-4px);
  }

  .hero-scroll {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(244,225,193,0.6);
    font-size: 0.75rem;
    animation: fadeIn 2s ease 1.5s both;
    cursor: pointer;
    text-decoration: none;
  }

  .hero-scroll-dot {
    width: 2px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(244,225,193,0.6), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }

  @keyframes scrollLine {
    0%, 100% { transform: scaleY(1); opacity: 1; }
    50% { transform: scaleY(0.5); opacity: 0.5; }
  }

  /* ===== SECTIONS GENERAL ===== */
  section {
    padding: 100px 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .section-header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(107,66,38,0.1);
    color: var(--brown);
    padding: 6px 18px;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 1rem;
    letter-spacing: 1px;
  }

  .section-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 1rem;
    line-height: 1.2;
  }

  .section-title span {
    color: var(--brown);
    position: relative;
  }

  .section-title span::after {
    content: '';
    position: absolute;
    bottom: -4px;
    right: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(to left, var(--brown), var(--cream-dark));
    border-radius: 2px;
  }

  .section-desc {
    font-size: 1.05rem;
    color: var(--text-mid);
    max-width: 550px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .divider {
    width: 60px;
    height: 4px;
    background: linear-gradient(to right, var(--brown), var(--cream-dark));
    border-radius: 2px;
    margin: 1rem auto 0;
  }

  /* ===== ABOUT ===== */
  #about {
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  #about::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(to right, var(--brown-dark), var(--brown), var(--cream-dark));
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
  }

  .about-visual {
    position: relative;
  }

  .about-img-main {
    width: 100%;
    height: 450px;
    background: linear-gradient(135deg, var(--brown) 0%, var(--brown-dark) 100%);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .about-img-main::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(244,225,193,0.15), transparent 60%);
  }

  .about-float-card {
    position: absolute;
    bottom: -20px;
    left: -20px;
    background: var(--cream);
    border-radius: 14px;
    padding: 20px 25px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 2;
    border: 2px solid rgba(107,66,38,0.1);
  }

  .float-card-icon {
    width: 50px;
    height: 50px;
    background: var(--brown);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--cream);
    font-size: 1.3rem;
  }

  .float-card-text span:first-child {
    display: block;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--brown);
    line-height: 1;
  }

  .float-card-text span:last-child {
    font-size: 0.8rem;
    color: var(--text-mid);
    font-weight: 500;
  }

  .about-float-card2 {
    position: absolute;
    top: 20px;
    left: -15px;
    background: var(--brown);
    border-radius: 12px;
    padding: 15px 20px;
    box-shadow: var(--shadow-hover);
    color: var(--cream);
    text-align: center;
    z-index: 2;
  }

  .about-float-card2 .icon {
    font-size: 1.5rem;
    margin-bottom: 5px;
  }

  .about-float-card2 span {
    font-size: 0.75rem;
    font-weight: 600;
    display: block;
    opacity: 0.9;
  }

  .about-content .section-header {
    text-align: right;
  }

  .about-content .divider {
    margin: 1rem 0 0;
  }

  .about-text {
    font-size: 1rem;
    color: var(--text-mid);
    line-height: 2;
    margin-bottom: 1.5rem;
  }

  .about-values {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 2rem;
  }

  .about-value {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream-light);
    padding: 12px 16px;
    border-radius: 12px;
    border-right: 4px solid var(--brown);
    transition: var(--transition);
  }

  .about-value:hover {
    background: var(--cream);
    transform: translateX(-5px);
  }

  .about-value i {
    color: var(--brown);
    font-size: 1.1rem;
  }

  .about-value span {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dark);
  }

  /* ===== SERVICES ===== */
  #services {
    background: var(--cream-light);
    position: relative;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.8rem;
  }

  .service-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    transition: var(--transition);
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(107,66,38,0.08);
  }

  .service-card::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(to right, var(--brown), var(--cream-dark));
    transform: scaleX(0);
    transition: var(--transition);
  }

  .service-card:hover {
    border-color: var(--cream-dark);
    transform: translateY(-10px);
    box-shadow: var(--shadow-hover);
  }

  .service-card:hover::before {
    transform: scaleX(1);
  }

  .service-icon-wrap {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--brown), var(--brown-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
    transition: var(--transition);
    box-shadow: 0 8px 25px rgba(107,66,38,0.2);
  }

  .service-card:hover .service-icon-wrap {
    transform: rotateY(180deg) scale(1.1);
  }

  .service-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 0.8rem;
  }

  .service-desc {
    font-size: 0.9rem;
    color: var(--text-mid);
    line-height: 1.8;
  }

  /* ===== PORTFOLIO ===== */
  #portfolio {
    background: var(--white);
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto auto;
    gap: 1.5rem;
  }

  .portfolio-item {
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(107,66,38,0.1);
    transition: var(--transition);
  }

  .portfolio-item:first-child {
    grid-column: span 2;
    grid-row: span 2;
  }

  .portfolio-item:hover {
    transform: scale(0.98);
    box-shadow: var(--shadow-hover);
  }

  .portfolio-img {
    width: 100%;
    height: 100%;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }

  .portfolio-item:first-child .portfolio-img {
    min-height: 450px;
    font-size: 7rem;
  }

  .portfolio-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(74,44,22,0.9) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2rem;
    transform: translateY(100%);
    transition: var(--transition);
    opacity: 0;
  }

  .portfolio-item:hover .portfolio-overlay {
    transform: translateY(0);
    opacity: 1;
  }

  .portfolio-overlay h3 {
    color: var(--cream);
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }

  .portfolio-overlay p {
    color: rgba(244,225,193,0.8);
    font-size: 0.85rem;
  }

  .portfolio-tag {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(107,66,38,0.85);
    color: var(--cream);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    backdrop-filter: blur(10px);
  }

  /* Portfolio colors */
  .p-bg-1 { background: linear-gradient(135deg, #8b6542, #6b4226); }
  .p-bg-2 { background: linear-gradient(135deg, #c4955a, #a0723a); }
  .p-bg-3 { background: linear-gradient(135deg, #6b4226, #4a2c16); }
  .p-bg-4 { background: linear-gradient(135deg, #d4a96a, #b8885a); }
  .p-bg-5 { background: linear-gradient(135deg, #7a5030, #5a3a20); }

  /* ===== TESTIMONIALS ===== */
  #testimonials {
    background: var(--brown-dark);
    position: relative;
    overflow: hidden;
  }

  #testimonials::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(244,225,193,0.05), transparent 70%);
  }

  #testimonials .section-tag {
    background: rgba(244,225,193,0.15);
    color: var(--cream);
  }

  #testimonials .section-title {
    color: var(--cream);
  }

  #testimonials .section-title span {
    color: var(--cream-dark);
  }

  #testimonials .section-title span::after {
    background: var(--cream-dark);
  }

  #testimonials .section-desc {
    color: rgba(244,225,193,0.7);
  }

  #testimonials .divider {
    background: linear-gradient(to right, var(--cream), var(--cream-dark));
  }

  .testimonials-slider {
    position: relative;
    overflow: hidden;
  }

  .testimonials-track {
    display: flex;
    gap: 1.5rem;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .testimonial-card {
    min-width: calc(33.333% - 1rem);
    background: rgba(244,225,193,0.08);
    border: 1px solid rgba(244,225,193,0.15);
    border-radius: var(--radius);
    padding: 2rem;
    backdrop-filter: blur(10px);
    transition: var(--transition);
    flex-shrink: 0;
  }

  .testimonial-card:hover {
    background: rgba(244,225,193,0.13);
    border-color: rgba(244,225,193,0.3);
    transform: translateY(-5px);
  }

  .testimonial-quote {
    font-size: 2.5rem;
    color: var(--cream-dark);
    opacity: 0.5;
    margin-bottom: 0.5rem;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .testimonial-text {
    color: rgba(244,225,193,0.9);
    font-size: 0.95rem;
    line-height: 1.9;
    margin-bottom: 1.5rem;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .author-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--brown);
    font-family: 'Playfair Display', serif;
    background: var(--cream);
    flex-shrink: 0;
  }

  .author-info span:first-child {
    display: block;
    color: var(--cream);
    font-weight: 700;
    font-size: 0.95rem;
  }

  .author-info span:last-child {
    color: rgba(244,225,193,0.6);
    font-size: 0.8rem;
  }

  .testimonial-stars {
    color: #f4d03f;
    font-size: 0.85rem;
    margin-top: 3px;
  }

  .slider-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 2.5rem;
  }

  .slider-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(244,225,193,0.15);
    border: 1px solid rgba(244,225,193,0.3);
    color: var(--cream);
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slider-btn:hover {
    background: var(--cream);
    color: var(--brown);
  }

  .slider-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(244,225,193,0.3);
    cursor: pointer;
    transition: var(--transition);
  }

  .dot.active {
    background: var(--cream);
    width: 24px;
    border-radius: 4px;
  }

  /* ===== FAQ ===== */
  #faq {
    background: var(--cream-light);
  }

  .faq-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .faq-item {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid transparent;
    transition: var(--transition);
    box-shadow: 0 2px 15px rgba(107,66,38,0.06);
  }

  .faq-item.open {
    border-color: var(--cream-dark);
    box-shadow: var(--shadow);
  }

  .faq-q {
    padding: 1.3rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 1rem;
  }

  .faq-q span {
    font-weight: 600;
    color: var(--text-dark);
    font-size: 0.95rem;
    flex: 1;
  }

  .faq-q .faq-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--brown);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    transition: var(--transition);
  }

  .faq-item.open .faq-icon {
    background: var(--brown);
    color: var(--cream);
    transform: rotate(45deg);
  }

  .faq-a {
    padding: 0 1.5rem;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
  }

  .faq-a p {
    color: var(--text-mid);
    font-size: 0.9rem;
    line-height: 1.9;
    padding-bottom: 1.5rem;
    border-top: 1px solid var(--cream);
    padding-top: 1rem;
  }

  .faq-item.open .faq-a {
    max-height: 200px;
  }

  /* ===== CONTACT ===== */
  #contact {

    position: relative;
    overflow: hidden;
  }

  #contact::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;

  .contact-grid {

    line-height: 1.8;

  .contact-items {

  .contact-item {

    padding: 16px 20px;
    background: var(--cream-light);

    text-decoration: none;
    color: inherit;

  .contact-item:hover {
    background: var(--cream);
    border-color: var(--cream-dark);

  .contact-item-icon {

  .contact-item-text span:first-child {

    font-size: 0.75rem;

  .contact-item-text span:last-child {

  .social-links {
    display: flex;
    gap: 12px;
  }

  .social-link {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--brown);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    text-decoration: none;
    transition: var(--transition);
    box-shadow: 0 4px 15px rgba(107,66,38,0.2);
  }

  .social-link:hover {
    background: var(--brown-dark);
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(107,66,38,0.3);
  }

  .contact-form {
    background: var(--cream-light);
    border-radius: var(--radius);
    padding: 2.5rem;
    border: 2px solid rgba(107,66,38,0.1);
  }

  .form-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 0.3rem;
  }

  .form-subtitle {
    color: var(--text-mid);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
